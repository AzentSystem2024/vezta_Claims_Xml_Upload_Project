<header>
  <dx-toolbar class="header-toolbar">
    <dxi-item
      *ngIf="menuToggleEnabled"
      location="before"
      widget="dxButton"
      cssClass="menu-button"
      [options]="{
        icon: 'menu',
        stylingMode: 'text',
        onClick: toggleMenu,
      }"
    >
    </dxi-item>

    <dxi-item location="before" cssClass="header-logo">
      <div *dxTemplate class="d-flex align-items-end">
        <img
          src="../../../../assets/db9e90192c301cf5b1bf7b1cf9d1a26e187f85ab.png"
          alt="{{ title }}"
          height="24"
          class="me-1"
        />
      </div>
    </dxi-item>

    <dxi-item location="after" locateInMenu="never">
      <ng-container *dxTemplate>
        <theme-switcher></theme-switcher>
      </ng-container>
    </dxi-item>

    <!-- <dxi-item location="after">
      <div *dxTemplate>
        <div class="messages">
          <dx-button icon="belloutline" stylingMode="text"> </dx-button>
          <div class="dx-badge">4</div>
        </div>
      </div>
    </dxi-item> -->
    <dxi-item location="after" locateInMenu="auto">
      <div class="me-2">{{ customerInfo.customerName }}</div>
    </dxi-item>

    <dxi-item location="after" locateInMenu="auto" menuItemTemplate="menuItem">
      <div *dxTemplate="let data of 'item'">
        <user-panel
          [user]="user"
          [menuItems]="userMenuItems"
          menuMode="context"
          id="userPanel"
        ></user-panel>
        <!-- Tooltip to display loginName -->
        <dx-tooltip
          target="#userPanel"
          [visible]="true"
          showEvent="mouseenter"
          hideEvent="mouseleave"
        >
          <span>{{ user.name }}</span>
        </dx-tooltip>
      </div>
    </dxi-item>
    <div *dxTemplate="let data of 'menuItem'">
      <user-panel
        [user]="user"
        [menuItems]="userMenuItems"
        menuMode="list"
      ></user-panel>
    </div>
  </dx-toolbar>
</header>
