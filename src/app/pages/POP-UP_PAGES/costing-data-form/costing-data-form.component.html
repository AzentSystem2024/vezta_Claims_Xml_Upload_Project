<div class="view-wrapper m-0">
  <dx-data-grid
    #dataGrid
    [dataSource]="GridDataSource"
    noDataText="No Data Available"
    [showBorders]="true"
    [allowColumnResizing]="true"
    [allowColumnReordering]="true"
    [rowAlternationEnabled]="true"
    rowAlternationInterval="2"
    [columnAutoWidth]="true"
    [columnFixing]="{ enabled: true }"
    [height]="'90vh'"
    [width]="'100%'"
    [summary]="summaryColumnsData"
    (onCellPrepared)="onCellPrepared($event)"
    (onExporting)="onExporting($event)"
    (onCellDblClick)="Costing_Details_onCellClick($event)"
  >
    <ng-container *ngFor="let column of columnsConfig">
      <dxi-column
        *ngIf="column.Band && column.Band !== ''"
        [caption]="column.Band"
        [isBand]="true"
        [alignment]="'center'"
        [allowResizing]="false"
        [allowFixing]="false"
      >
        <dxi-column
          *ngFor="let subColumn of column.columns"
          [dataField]="subColumn.dataField"
          [caption]="subColumn.caption"
          [format]="subColumn.format"
          [visible]="subColumn.visible"
          [allowFixing]="true"
          [allowHiding]="true"
          [allowResizing]="false"
        ></dxi-column>
      </dxi-column>

      <dxi-column
        *ngIf="!column.Band || column.Band === ''"
        [dataField]="column.dataField"
        [caption]="column.caption"
        [format]="column.format"
        [visible]="column.visible"
      ></dxi-column>
    </ng-container>
    <dxo-selection enabled="false"></dxo-selection>
    <dxo-filter-row [visible]="true" applyFilter="auto"></dxo-filter-row>
    <dxo-header-filter [visible]="true"></dxo-header-filter>
    <dxo-export [enabled]="true" [allowExportSelectedData]="false"></dxo-export>
    <dxo-scrolling mode="virtual"></dxo-scrolling>
    <dxo-load-panel [enabled]="true" [showPane]="true"></dxo-load-panel>
    <dxo-paging [pageSize]="25"></dxo-paging>
    <dxo-pager
      [visible]="true"
      [allowedPageSizes]="allowedPageSizes"
      [showPageSizeSelector]="showPageSizeSelector"
      [showInfo]="showInfo"
      [showNavigationButtons]="showNavButtons"
    >
    </dxo-pager>

    <dxo-toolbar>
      <dxi-item location="before" locateInMenu="auto" class="me-2">
        <dx-text-box
          label="Facility"
          labelMode="floating"
          [width]="200"
          [(value)]="facilityName"
          [readOnly]="true"
        >
        </dx-text-box>
      </dxi-item>

      <dxi-item location="before" locateInMenu="auto" class="me-2">
        <div class="d-flex gap-2">
          <dx-date-box
            [(value)]="fromDate"
            label="From Date"
            labelMode="floating"
            displayFormat="dd-MM-yyyy"
            [width]="150"
            [readOnly]="true"
          >
          </dx-date-box>

          <dx-date-box
            [(value)]="toDate"
            label="To Date"
            labelMode="floating"
            displayFormat="dd-MM-yyyy"
            [width]="150"
            [readOnly]="true"
          >
          </dx-date-box>
        </div>
      </dxi-item>

      <dxi-item
        name="exportButton"
        location="after"
        cssClass="custom-export-button"
      ></dxi-item>

      <dxi-item location="after" locateInMenu="auto">
        <dx-button
          text="View XML"
          icon="file"
          type="default"
          stylingMode="contained"
          (onClick)="generateXmlContent()"
        ></dx-button>
      </dxi-item>
    </dxo-toolbar>
  </dx-data-grid>
</div>

<!-- ============ claim details popup claim number click ============== -->
<form-popup
  class="formPopupClass"
  [(visible)]="isSingleClaimDetailsVisible"
  [visibleButtons]="false"
  titleText="Claim Details"
  [width]="'95%'"
>
  <app-single-claim-details
    *ngIf="isSingleClaimDetailsVisible"
    [rowData]="clickedCellRowData"
  ></app-single-claim-details>
</form-popup>

<!--  ============= costing details view on cell click event ============ -->
<dx-popup
  [(visible)]="isCostingPopupVisible"
  [title]="'Costing View'"
  [width]="'90%'"
  [height]="'auto'"
  [showCloseButton]="true"
  [dragEnabled]="true"
  [closeOnOutsideClick]="true"
>
  <dx-data-grid
    [dataSource]="costingPopupData"
    [showBorders]="true"
    [allowColumnResizing]="true"
    [columnAutoWidth]="true"
    [showRowLines]="true"
    [allowColumnReordering]="true"
    [height]="'90vh'"
    [noDataText]="'No Data'"
  >
    <!-- Paging + Pager -->
    <dxo-paging [pageSize]="10"></dxo-paging>
    <dxo-pager
      [showPageSizeSelector]="true"
      [allowedPageSizes]="[10, 20, 50]"
      [showInfo]="true"
    >
    </dxo-pager>

    <dxo-filter-row [visible]="true" applyFilter="auto"></dxo-filter-row>
    <dxo-header-filter [visible]="true"></dxo-header-filter>

    <dxo-scrolling mode="virtual"></dxo-scrolling>

    <dxo-summary>
      <dxi-total-item
        column="Cost"
        summaryType="sum"
        [valueFormat]="{ type: 'fixedPoint', precision: 2, useGrouping: true }"
        displayFormat="Total: {0}"
      >
      </dxi-total-item>
    </dxo-summary>
  </dx-data-grid>
</dx-popup>

<!-- ========= XML data lookup for test and production upload Popup ======== -->
<dx-popup
  [(visible)]="showXmlPopup"
  [height]="'100vh'"
  [width]="'90%'"
  [title]="
    IsReprocess
      ? 'Upload Clinical Costing XML - Resubmission : ' + facilityName
      : 'Upload Clinical Costing XML : ' + facilityName
  "
  [dragEnabled]="true"
  [closeOnOutsideClick]="false"
  (onHidden)="onPopupClosed()"
>
  <div class="d-flex flex-column h-100">
    <div class="d-flex align-items-center mb-2">
      <!-- RIGHT: Select + Upload -->
      <div class="d-flex align-items-center ms-auto">
        <dx-select-box
          class="me-2"
          [items]="uploadOptions"
          [(value)]="uploadMode"
          width="220"
          displayExpr="text"
          valueExpr="value"
          stylingMode="outlined"
          placeholder="Select Mode"
          (onValueChanged)="onUploadModeChanged()"
        >
        </dx-select-box>

        <dx-button
          text="Upload"
          type="default"
          stylingMode="contained"
          [disabled]="
            !selectedRowsData?.length ||
            !selectedRowData ||
            selectedRowData.StatusID !== 5
          "
          (onClick)="uploadXmlFile()"
        ></dx-button>
      </div>
    </div>

    <!-- DataGrid -->
    <dx-data-grid
      [dataSource]="xmlGridData"
      [showBorders]="true"
      [columnAutoWidth]="true"
      [height]="gridHeight"
      keyExpr="XMLFileName"
      [(focusedRowKey)]="focusedRowKey"
      [focusedRowEnabled]="true"
      [(selectedRowKeys)]="selectedRowKeys"
      (onSelectionChanged)="onSelectionChanged($event)"
      (onCellClick)="onCellClick($event)"
    >

    
      <dxi-column dataField="XMLFileName" caption="File Name"></dxi-column>

      <dxi-column
        dataField="TestUpload"
        caption="Test Upload"
        [cellTemplate]="'testUploadCellTemplate'"
      ></dxi-column>

      <dxi-column
        dataField="ProductionUpload"
        caption="Production Upload"
        [cellTemplate]="'ProductionUploadCellTemplate'"
      ></dxi-column>

      <!-- Details Icon Column -->
      <dxi-column type="buttons" caption="" [width]="60" alignment="center">
        <dxi-button
          hint="View XML"
          icon="bi bi-filetype-xml"
          stylingMode="text"
          [onClick]="onDetailsClick"
        >
        </dxi-button>
      </dxi-column>

      <dxo-scrolling mode="virtual"></dxo-scrolling>
      <dxo-paging [pageSize]="25"></dxo-paging>
      <dxo-pager
        [visible]="true"
        [allowedPageSizes]="allowedPageSizes"
        [showPageSizeSelector]="showPageSizeSelector"
        [showInfo]="showInfo"
        [showNavigationButtons]="showNavButtons"
      >
      </dxo-pager>
      <dxo-selection mode="multiple"></dxo-selection>
      <dxo-sorting mode="multiple"></dxo-sorting>
      <dxo-header-filter [visible]="true"></dxo-header-filter>

      <!-- Template for Test Upload -->
      <div *dxTemplate="let cell of 'testUploadCellTemplate'">
        <span
          [ngStyle]="{
            color:
              (cell.data.TestUpload || '').toLowerCase() === 'failed'
                ? 'red'
                : 'inherit',
            'text-decoration':
              (cell.data.TestUpload || '').toLowerCase() === 'failed'
                ? 'underline'
                : 'none',
            cursor:
              (cell.data.TestUpload || '').toLowerCase() === 'failed'
                ? 'pointer'
                : 'default',
          }"
        >
          {{ cell.data.TestUpload }}
        </span>
      </div>

      <!-- Template for Production Upload -->
      <div *dxTemplate="let cell of 'ProductionUploadCellTemplate'">
        <span
          [ngStyle]="{
            color:
              (cell.data.ProductionUpload || '').toLowerCase() === 'failed'
                ? 'red'
                : 'inherit',
            'text-decoration':
              (cell.data.ProductionUpload || '').toLowerCase() === 'failed'
                ? 'underline'
                : 'none',
            cursor:
              (cell.data.ProductionUpload || '').toLowerCase() === 'failed'
                ? 'pointer'
                : 'default',
          }"
        >
          {{ cell.data.ProductionUpload }}
        </span>
      </div>
    </dx-data-grid>
  </div>

  <!-- Load Panel -->
  <dx-load-panel
    [visible]="isUploading"
    shadingColor="rgba(0,0,0,0.4)"
    [showIndicator]="true"
    [showPane]="true"
    [shading]="true"
    [closeOnOutsideClick]="false"
  >
    <div *dxTemplate="let data of 'content'">
      <div class="text-center p-3">
        <h4>Uploading Files...</h4>
        <p>Total: {{ totalCount }}</p>
        <b
          ><p>✅ Uploaded: {{ completedCount }}</p>
          <p>❌ Failed: {{ failedCount }}</p>
          <p>
            ⏳ Remaining: {{ totalCount - (completedCount + failedCount) }}
          </p></b
        >

        <dx-button
          text="Cancel"
          type="danger"
          stylingMode="contained"
          (onClick)="cancelUpload()"
          class="mt-3"
        ></dx-button>
      </div>
    </div>
  </dx-load-panel>
</dx-popup>

<!-- Popup 2: XML Details show and regenerate popup -->
<dx-popup
  [(visible)]="showXmlDetailsPopup"
  [height]="'100vh'"
  [width]="'90%'"
  title="XML Data"
  [dragEnabled]="true"
  [closeOnOutsideClick]="false"
  (onHidden)="onPopupHidden()"
>
  <div class="d-flex flex-column h-100 p-2">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-2">
      <p class="me-auto mb-0">{{ XmlFileName }}</p>

      <dx-button
        class="me-2"
        *ngIf="!isxmlEditMode && selectedXmlRow?.IsUpdate === 1"
        icon="edit"
        type="normal"
        hint="Start Editing"
        stylingMode="text"
        (onClick)="onEditXml()"
      >
      </dx-button>

      <!-- REGENERATE BUTTON (Visible only if NOT in edit mode and IsUpdate === 1) -->
      <dx-button
        *ngIf="!isxmlEditMode && selectedXmlRow?.IsUpdate === 1"
        text="Regenerate Xml"
        type="default"
        hint="Regenerate Xml"
        stylingMode="contained"
        (onClick)="onRegenerateExcel()"
      >
      </dx-button>

      <!-- BACK BUTTON (Visible only in edit mode) -->
      <dx-button
        *ngIf="isxmlEditMode"
        class="me-2"
        icon="arrowleft"
        type="normal"
        hint="Exit Editing"
        stylingMode="text"
        (onClick)="onCancelEditXml()"
      >
      </dx-button>

      <!-- SAVE BUTTON (Visible only in edit mode) -->
      <dx-button
        *ngIf="isxmlEditMode"
        text="Save"
        type="default"
        hint="Save Edited Xml"
        stylingMode="contained"
        (onClick)="onUpdateXmlData()"
      >
      </dx-button>
    </div>

    <!-- XML Content -->
    <dx-text-area
      [(value)]="xmlData"
      [readOnly]="!isxmlEditMode"
      [height]="'100%'"
      stylingMode="outlined"
      class="flex-grow-1 mb-3"
    >
    </dx-text-area>

    <!-- Bottom Controls -->
    <div class="d-flex justify-content-end mt-2">
      <dx-button
        text="Cancel"
        type="normal"
        stylingMode="outlined"
        (onClick)="onPopupHidden()"
      >
      </dx-button>

      <dx-button
        class="ms-2"
        text="Download"
        type="default"
        stylingMode="contained"
        [disabled]="isxmlEditMode"
        (onClick)="downloadXmlFile()"
      >
      </dx-button>
    </div>
  </div>
</dx-popup>

<dx-load-panel
  #loadPanel
  shadingColor="rgba(0,0,0,0.0)"
  [(visible)]="loadingVisible"
  [showIndicator]="true"
  [showPane]="true"
  [shading]="true"
  [message]="'Loading...'"
>
</dx-load-panel>

<dx-load-panel
  #loadPanel
  shadingColor="rgba(0,0,0,0.0)"
  [(visible)]="regenerateLoadingVisible"
  [showIndicator]="true"
  [showPane]="true"
  [shading]="true"
  [message]="'Regenerating...'"
>
</dx-load-panel>
