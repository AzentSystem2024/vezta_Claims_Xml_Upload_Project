<dx-form class="plain-styled-form">
  <dxi-item itemType="group">
    <dxo-col-count-by-screen
      [xs]="1"
      [sm]="1"
      [md]="1"
      [lg]="1"
    ></dxo-col-count-by-screen>

    <dxi-item>
      <div *dxTemplate>
        <dx-text-box
          label="Profession"
          [(value)]="newclinicianProfession.ProfessionValue"
          height="40"
          labelMode="floating"
        >
        </dx-text-box>
      </div>
    </dxi-item>

    <dxi-item height="30px">
      <div *dxTemplate>
        <dx-text-area
          label="Description"
          labelMode="floating"
          [(value)]="newclinicianProfession.DescriptionValue"
          [height]="200"
          placeholder="Enter a desciption..."
          [width]="'100%'"
          [maxHeight]="250"
          [minHeight]="50"
          [autoResizeEnabled]="true"
        >
        </dx-text-area>
      </div>
    </dxi-item>
  </dxi-item>
</dx-form>
