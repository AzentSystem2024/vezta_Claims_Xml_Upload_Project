<dx-form class="plain-styled-form">
    <dxi-item itemType="group">
        <dxo-col-count-by-screen [xs]="1" [sm]="1" [md]="1" [lg]="1"></dxo-col-count-by-screen>

        <dxi-item>
            <div *dxTemplate>
                <dx-text-box label="Category" [(value)]="newclinicianCategory.CategoryValue" labelMode="floating"  height="40">
                </dx-text-box>
            </div>
        </dxi-item>

        <dxi-item height="30px">
            <div *dxTemplate>
                <dx-text-area label="Description" [(value)]="newclinicianCategory.DescriptionValue" placeholder="Enter a desciption..." [height]="200"
                    [width]="'100%'" [maxHeight]="250" [minHeight]="50" [autoResizeEnabled]="true" labelMode="floating">
                </dx-text-area>
            </div>
        </dxi-item>

    </dxi-item>
</dx-form>
