<div class="loginMainDiv">
  <div class="auth-card">
    <div class="dx-card content">
      <div style="position: relative">
        <dx-button
          icon="close"
          stylingMode="text"
          class="close-icon"
          *ngIf="isResetPasswordPage"
          (onClick)="redirectToLogin()"
        >
        </dx-button>
      </div>

      <div class="header d-flex flex-column align-items-center text-center">
        <div class="logo mb-1">
          <img
            src="../../../../assets/db9e90192c301cf5b1bf7b1cf9d1a26e187f85ab.png"
            alt="{{ title }}"
            height="40"
          />
        </div>
        <div class="description">{{ description }}</div>
      </div>
      <ng-content></ng-content>
    </div>
  </div>
</div>
