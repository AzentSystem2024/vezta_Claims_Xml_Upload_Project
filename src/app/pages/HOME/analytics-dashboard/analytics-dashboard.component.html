<div class="view-wrapper list-page"></div>
<dx-load-panel
  #loadPanel
  [position]="{ of: '.view-wrapper', at: 'center', my: 'center' }"
  shadingColor="rgba(0,0,0,0)"
  [(visible)]="loadingVisible"
  [showIndicator]="true"
  [showPane]="true"
  [shading]="true"
  [message]="'Loading...'"
>
</dx-load-panel>
