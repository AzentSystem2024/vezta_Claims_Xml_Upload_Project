<ng-content></ng-content>

<div class="menu-container theme-dependent">
  <dx-tree-view
    [items]="items"
    keyExpr="id"
    displayExpr="text"
    selectionMode="single"
    [(selectedItemKeys)]="selectedItemKeys"
    [focusStateEnabled]="false"
    (onItemClick)="onItemClick($event)"
    expandEvent="click"
    [searchEnabled]="true"
    searchMode="contains"
    width="100%"
  >
  </dx-tree-view>
</div>
